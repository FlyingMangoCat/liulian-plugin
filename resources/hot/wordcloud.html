<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>热搜词云</title>
  <script src="https://cdn.jsdelivr.net/npm/wordcloud@1.2.2/src/wordcloud2.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #e67e22 0%, #d35400 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(230, 126, 34, 0.3);
    }
    h1 {
      text-align: center;
      color: #e67e22;
      margin-bottom: 30px;
      font-size: 28px;
      font-weight: 600;
    }
    .chart-container {
      position: relative;
      height: 600px;
      background: #f8f9fa;
      border-radius: 12px;
      padding: 20px;
      border: 2px solid rgba(230, 126, 34, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #wordCloudChart {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>{{ title }}</h1>
    <div class="chart-container">
      <canvas id="wordCloudChart" data-chart="{{ chartData }}"></canvas>
    </div>
  </div>

  <script>
    const chartData = JSON.parse(document.getElementById('wordCloudChart').dataset.chart);
    
    const element = document.getElementById('wordCloudChart');
    const container = element.parentElement;
    
    // 设置 canvas 尺寸
    element.width = container.offsetWidth;
    element.height = container.offsetHeight;
    
    // 转换为 WordCloud2.js 需要的格式
    const wordList = chartData.map(d => [d.text, d.value * 3]);
    
    // 颜色数组
    const colors = [
      '#e67e22', '#f39c12', '#d35400', 
      '#27ae60', '#3498db', '#9b59b6', 
      '#e74c3c', '#1abc9c'
    ];
    
    WordCloud(element, {
      list: wordList,
      gridSize: Math.round(16 * element.width / 1024),
      weightFactor: function (size) {
        return Math.pow(size, 0.8) * element.width / 1024 * 2;
      },
      fontFamily: 'Microsoft YaHei, SimHei, Arial',
      color: function (word, weight, fontSize, distance, theta) {
        return colors[Math.floor(Math.random() * colors.length)];
      },
      rotateRatio: 0.3,
      rotationSteps: 2,
      backgroundColor: 'transparent',
      shape: 'circle'
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>热搜词云</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-wordcloud@2.3.0/dist/chartjs-chart-wordcloud.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
      font-size: 28px;
      font-weight: 600;
    }
    .chart-container {
      position: relative;
      height: 600px;
      background: #f8f9fa;
      border-radius: 12px;
      padding: 20px;
    }
    canvas {
      width: 100% !important;
      height: 100% !important;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>{{ title }}</h1>
    <div class="chart-container">
      <canvas id="wordCloudChart"></canvas>
    </div>
  </div>

  <script>
    const chartData = {{{ chartData }}};
    
    const ctx = document.getElementById('wordCloudChart').getContext('2d');
    
    new Chart(ctx, {
      type: 'wordCloud',
      data: {
        labels: chartData.map(d => d.text),
        datasets: [{
          label: '出现次数',
          data: chartData.map(d => d.value),
          backgroundColor: chartData.map((_, i) => {
            const colors = [
              'rgba(102, 126, 234, 0.8)',
              'rgba(118, 75, 162, 0.8)',
              'rgba(255, 107, 107, 0.8)',
              'rgba(78, 205, 196, 0.8)',
              'rgba(255, 230, 109, 0.8)',
              'rgba(247, 127, 0, 0.8)',
              'rgba(0, 168, 255, 0.8)',
              'rgba(114, 137, 218, 0.8)'
            ];
            return colors[i % colors.length];
          }),
          borderColor: chartData.map((_, i) => {
            const colors = [
              'rgba(102, 126, 234, 1)',
              'rgba(118, 75, 162, 1)',
              'rgba(255, 107, 107, 1)',
              'rgba(78, 205, 196, 1)',
              'rgba(255, 230, 109, 1)',
              'rgba(247, 127, 0, 1)',
              'rgba(0, 168, 255, 1)',
              'rgba(114, 137, 218, 1)'
            ];
            return colors[i % colors.length];
          }),
          borderWidth: 2
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            display: false
          },
          tooltip: {
            callbacks: {
              label: function(context) {
                return `${context.label}: ${context.raw} 次`;
              }
            }
          }
        }
      }
    });
  </script>
</body>
</html>
